name: KernelSU-Next + SUSFS Build

permissions:
  contents: read
  actions: read
  security-events: write
  id-token: write

on:
  push:
    branches: [base, clean]
  pull_request:
    branches: [base, clean]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create release'
        type: boolean
        default: false
      wildkernels_commit:
        description: 'WildKernels commit'
        type: string
        default: '5d39f3bf0ed9c950223d6db6b45c861fe3c5a635'
      susfs_commit:
        description: 'SUSFS commit'
        type: string
        default: '0ed20c1656af7806a1760837ad320e62a8fb40fd'

env:
  CCACHE_MAXSIZE: 2G
  DEFAULT_WILDKERNELS: 5d39f3bf0ed9c950223d6db6b45c861fe3c5a635
  DEFAULT_SUSFS: 0ed20c1656af7806a1760837ad320e62a8fb40fd
  KERNELSU_SETUP_URL: https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    outputs:
      ksu-version: ${{ steps.version.outputs.version }}
      build-date: ${{ steps.date.outputs.date }}
      package-name: ${{ steps.package.outputs.name }}

    steps:
      # --- ONLY ENABLE IF RUNNING OUT OF SPACE ---
      # - name: Maximize build space
      #   uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793
      #   with:
      #     remove-dotnet: true
      #     remove-android: true
      #     remove-haskell: true
      #     remove-codeql: true
      #     remove-docker-images: true
      #     remove-large-packages: true
      #     remove-swapfile: true

      - name: Checkout kernel
        uses: actions/checkout@v4
        with:
          repository: MiguVT/kernel_nothing_sm8475_github_actions
          ref: clean
          fetch-depth: 1

      - name: Fetch config files from base branch
        run: |
          # Fetch the base branch to get config files and anykernel.sh
          git fetch origin base
          git checkout origin/base -- configs/ksu-susfs.config anykernel.sh

          echo "✅ Config files fetched from base branch"
          ls -la configs/ anykernel.sh

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev \
            clang lld llvm git ccache zip unzip curl wget \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi pahole python3-dev

          # Setup ccache
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=compression=true
          ccache --set-config=hash_dir=false
          ccache --zero-stats

          # Setup scripts
          find scripts/ -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@afb4c9964b521afb97c864b7d40b11e6911bd410
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Set build date
        id: date
        run: echo "date=$(date +%y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Clone dependencies and apply patches
        run: |
          set -e

          WILDKERNELS_COMMIT="${{ github.event.inputs.wildkernels_commit || env.DEFAULT_WILDKERNELS }}"
          SUSFS_COMMIT="${{ github.event.inputs.susfs_commit || env.DEFAULT_SUSFS }}"

          echo "🔄 Cloning WildKernels patches..."
          git clone --depth=1 https://github.com/WildKernels/kernel_patches.git
          cd kernel_patches && git fetch origin $WILDKERNELS_COMMIT && git checkout $WILDKERNELS_COMMIT && cd ..

          echo "🔄 Cloning SUSFS..."
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git
          cd susfs4ksu && git fetch origin $SUSFS_COMMIT && git checkout $SUSFS_COMMIT && cd ..

          echo "🔄 Setting up KernelSU-Next..."
          curl -fsSL "$KERNELSU_SETUP_URL" -o setup_ksu_next.sh
          bash setup_ksu_next.sh

          echo "🔄 Applying patches..."
          # Apply WildKernels patches
          patch -p1 < kernel_patches/next/next_hooks.patch

          # Copy SUSFS files
          cp -r susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
          cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true

          # Apply SUSFS patches
          patch -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch

          cd KernelSU-Next
          patch -p1 < ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || true

          # Apply fix patches
          for patch in ../kernel_patches/next/susfs_fix_patches/v1.5.9/*.patch; do
            [ -f "$patch" ] && patch -p1 < "$patch" || true
          done
          cd ..

          echo "✅ All patches applied successfully"

      - name: Set KernelSU version
        id: version
        run: |
          cd KernelSU-Next/kernel
          VERSION=$(expr $(git rev-list --count HEAD) + 10200 || echo "10200")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "KernelSU-Next version: $VERSION"
          cd ../..

      - name: Configure kernel
        run: |
          set -e
          export ARCH=arm64

          echo "🔧 Generating kernel configuration..."
          make O=out ARCH=arm64 vendor/meteoric_defconfig

          # Apply KernelSU + SUSFS config from external file
          cat configs/ksu-susfs.config >> out/.config
          make O=out ARCH=arm64 olddefconfig

          # Update kernel version
          VERSION_STRING="Next-v${{ steps.version.outputs.version }}-SUSFS-${{ steps.date.outputs.date }}"
          echo "CONFIG_LOCALVERSION=\"-$VERSION_STRING\"" >> out/.config

          # Clean version string
          perl -pi -e 's/-dirty//g' scripts/setlocalversion
          perl -pi -e 's/-maybe-dirty//g' scripts/setlocalversion

          # Remove GKI exports for compatibility
          rm -f android/abi_gki_protected_exports_* || true

          echo "✅ Kernel configuration completed"

      - name: Build kernel
        run: |
          set -e

          export ARCH=arm64 SUBARCH=arm64
          export CC="ccache clang" CXX="ccache clang++"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export LLVM=1 LLVM_IAS=1

          JOBS=$(nproc)
          [ $JOBS -gt 16 ] && JOBS=16  # Cap for stability

          echo "🚀 Starting kernel build with $JOBS parallel jobs..."
          echo "Build configuration:"
          echo "  ✅ KernelSU-Next v${{ steps.version.outputs.version }}"
          echo "  ✅ SUSFS integration enabled"
          echo "  ✅ Performance optimizations"
          echo "  ✅ Ccache enabled"

          ccache --show-stats
          timeout 60m make O=out ARCH=arm64 CC="ccache clang" LLVM=1 LLVM_IAS=1 -j$JOBS 2>&1 | tee build.log
          ccache --show-stats

          # Find kernel image
          for img in "out/arch/arm64/boot/Image.gz-dtb" "out/arch/arm64/boot/Image-dtb" "out/arch/arm64/boot/Image.gz" "out/arch/arm64/boot/Image"; do
            [ -f "$img" ] && KERNEL_IMAGE="$img" && break
          done

          [ -z "$KERNEL_IMAGE" ] && echo "❌ No kernel image found!" && exit 1
          echo "✅ Build completed: $(basename "$KERNEL_IMAGE")"

      - name: Package kernel
        id: package
        run: |
          set -e

          echo "📦 Creating flashable package..."

          # Setup AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cp anykernel.sh anykernel/

          # Copy kernel files
          IMAGE=$(find out/arch/arm64/boot/ -name "Image*" -type f | head -1)
          cp "$IMAGE" anykernel/

          # Copy DTB/DTBO if available
          [ -f "out/arch/arm64/boot/dtbo.img" ] && cp out/arch/arm64/boot/dtbo.img anykernel/
          [ -f "out/arch/arm64/boot/dtb" ] && cp out/arch/arm64/boot/dtb anykernel/

          # Create package
          PACKAGE_NAME="Meteoric-KernelSU-Next-v${{ steps.version.outputs.version }}-SUSFS-${{ steps.date.outputs.date }}.zip"
          cd anykernel
          zip -r9 "../$PACKAGE_NAME" . -x README.md .git/\* \*.zip
          cd ..

          # Calculate checksums
          PACKAGE_SIZE=$(stat -c%s "$PACKAGE_NAME")
          SHA256=$(sha256sum "$PACKAGE_NAME" | cut -d' ' -f1)

          echo "✅ Package created successfully!"
          echo "Package: $PACKAGE_NAME"
          echo "Size: $PACKAGE_SIZE bytes"
          echo "SHA256: $SHA256"

          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

          # Create package info
          cat > package_info.txt << EOF
          KernelSU-Next + SUSFS Package Information
          ========================================

          Package Name: $PACKAGE_NAME
          Build Date: ${{ steps.date.outputs.date }}
          KernelSU Version: ${{ steps.version.outputs.version }}
          Package Size: $PACKAGE_SIZE bytes
          SHA256: $SHA256

          Features:
          - KernelSU-Next with LSM Security Hooks
          - SUSFS integration for root hiding
          - Performance optimizations (BBR TCP)
          - Nothing Phone 2 optimizations

          Installation:
          1. Boot into custom recovery (TWRP/OrangeFox)
          2. Flash the zip file
          3. Reboot system
          4. Install KernelSU-Next manager app
          5. Install SUSFS module

          Device Compatibility: Nothing Phone 2 (A/B partition)
          Android Versions: 13, 14, 15

          ⚠️ WARNING: Flash at your own risk! Always backup your boot partition first!
          EOF

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: kernel-package
          path: |
            *.zip
            package_info.txt
            build.log
            out/.config
          retention-days: 90

  release:
    name: Create Release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: build
    if: github.event.inputs.create_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: kernel-package

      - name: Create release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836
        with:
          tag_name: v${{ github.run_number }}-ksu${{ needs.build.outputs.ksu-version }}
          name: 'KernelSU-Next v${{ needs.build.outputs.ksu-version }} + SUSFS'
          draft: true
          make_latest: false
          files: |
            *.zip
            package_info.txt
          body: |
            ## 🚀 KernelSU-Next + SUSFS Build

            ### ✨ Features
            - **KernelSU-Next v${{ needs.build.outputs.ksu-version }}** with LSM Security Hooks
            - **SUSFS integration** for maximum root hiding capabilities
            - **Performance optimizations** including BBR TCP congestion control
            - **Nothing Phone 2 specific optimizations** for better compatibility
            - **Enhanced security** with proper patch application

            ### 🛡️ Root Hiding Capabilities
            - Path hiding for suspicious directories
            - Mount point hiding for KernelSU and modules
            - Symbol hiding from /proc/kallsyms
            - Kernel version spoofing
            - Command line parameter spoofing
            - File access redirection
            - Complete magic mount support

            ### 📱 Device Support
            - **Device**: Nothing Phone 2 (Pong)
            - **Android**: 13, 14, 15
            - **Partition**: A/B slot device
            - **Architecture**: ARM64

            ### 🔧 Installation Guide

            **Prerequisites:**
            - Unlocked bootloader
            - Custom recovery (TWRP/OrangeFox) OR root access with kernel flasher app

            **Method 1: Custom Recovery**
            1. **⚠️ BACKUP** your current boot partition first!
            2. Boot into custom recovery
            3. Flash the zip file
            4. Reboot to system
            5. Install KernelSU-Next manager from GitHub releases
            6. Install SUSFS module through KernelSU manager

            **Method 2: Kernel Flasher App (if already rooted)**
            1. Download and install a kernel flasher app
            2. Grant root permissions to the app
            3. Select and flash the zip file
            4. Reboot device

            ### 📋 Build Information
            - **Build Date**: ${{ needs.build.outputs.build-date }}
            - **Package**: ${{ needs.build.outputs.package-name }}
            - **Compiler**: Clang with LLVM + ccache optimization
            - **Configuration**: vendor/meteoric_defconfig + KSU/SUSFS options

            ### ⚠️ Important Warnings
            - **EXPERIMENTAL SOFTWARE** - Flash at your own risk!
            - **BACKUP REQUIRED** - Always backup boot partition before flashing
            - **WARRANTY VOID** - This will void your device warranty
            - **BOOTLOOP RISK** - Ensure you can access fastboot/recovery mode

            ### 🔗 Useful Links
            - [KernelSU-Next GitHub](https://github.com/KernelSU-Next/KernelSU-Next)
            - [SUSFS GitLab](https://gitlab.com/simonpunk/susfs4ksu)
            - [Nothing Phone 2 XDA Forum](https://xdaforums.com/f/nothing-phone-2.12585/)

            ---

            **Checksums and verification info available in package_info.txt**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
