name: Build KernelSU-Next with SUSFS Integration

on:
  push:
    branches: [ main, clean ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create release draft'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: MiguVT/kernel_nothing_sm8475_github_actions
        ref: clean

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev
        sudo apt-get install -y clang lld llvm git gawk lz4 cpio xz-utils pahole
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
        sudo apt-get install -y python3-pip python3-dev

    - name: Clone susfs4ksu
      run: |
        git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android12-5.10 susfs4ksu

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r28c
        add-to-path: true

    - name: Apply SUSFS patches FIRST (CRITICAL STEP)
      run: |
        set -euo pipefail

        echo "=== Applying SUSFS kernel patches BEFORE KernelSU-Next ==="

        # Copy SUSFS kernel files (REQUIRED even with next-susfs)
        cp -r susfs4ksu/kernel_patches/fs/* fs/
        cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/

        # Copy patch files for android12-5.10
        cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch ./

        # Apply the kernel patch
        echo "Applying 50_add_susfs_in_gki-android12-5.10.patch..."
        patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch || {
          echo "❌ SUSFS kernel patch failed! Manual intervention needed."
          exit 1
        }

        # Clean up patch file
        rm -f 50_add_susfs_in_gki-android12-5.10.patch

    - name: Install KernelSU-Next with SUSFS (AFTER patches applied)
      run: |
        set -euo pipefail

        echo "=== Installing KernelSU-Next next-susfs branch ==="
        # Now install KernelSU-Next on the SUSFS-patched kernel
        curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/next-susfs/kernel/setup.sh" | bash -s next-susfs

#    - name: Apply compilation fixes (CRITICAL)
