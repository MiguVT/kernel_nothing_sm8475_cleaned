name: Build Meteoric Kernel with KernelSU-Next + SUSFS

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the release'
        required: true
        default: 'v1.0.0'
        type: string
      make_draft:
        description: 'Create release draft instead of artifact?'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      ARCH: arm64
      SUBARCH: arm64
      KBUILD_BUILD_HOST: GitHub-Actions
      KBUILD_BUILD_USER: ci-builder

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc git curl \
            libncurses-dev bison flex libssl-dev libelf-dev \
            clang lld llvm zstd binutils-aarch64-linux-gnu

      - name: Setup KernelSU-Next
        run: |
          echo "Setting up KernelSU-Next..."
          curl -fsSL \
            https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh \
            | bash -

      - name: Clone SUSFS and apply patches
        run: |
          SUSFS_REPO="https://gitlab.com/simonpunk/susfs4ksu.git"
          SUSFS_BRANCH="gki-android12-5.10"
          echo "Cloning susfs4ksu repository..."
          git clone --depth=1 --branch "$SUSFS_BRANCH" "$SUSFS_REPO" susfs4ksu

          echo "Applying SUSFS kernel patches..."
          patch -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_${SUSFS_BRANCH}.patch

          cp -r susfs4ksu/kernel_patches/fs     fs/
          cp -r susfs4ksu/kernel_patches/include/linux include/linux/

          mkdir -p drivers/kernelsu/susfs_module
          cp -r susfs4ksu/ksu_module_susfs/* drivers/kernelsu/susfs_module/

      - name: Setup Neutron toolchain
        run: |
          NEUTRON_DIR="$HOME/toolchain/neutron-clang"
          mkdir -p "$NEUTRON_DIR"
          curl -fsSL \
            https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman \
            -o "$NEUTRON_DIR/antman"
          chmod +x "$NEUTRON_DIR/antman" && "$NEUTRON_DIR/antman" -S
          echo "$NEUTRON_DIR/bin" >> $GITHUB_PATH

      - name: Configure kernel
        run: ./.github/scripts/configure_kernel.sh

      - name: Compile kernel
        run: |
          PROCS=$(nproc)
          export PROCS
          echo "Starting kernel compilation..."
          make -j"$PROCS" O=out ARCH=$ARCH \
               LLVM=1 LLVM_IAS=1 \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               CROSS_COMPILE=aarch64-linux-android- \
               CROSS_COMPILE_COMPAT=arm-linux-androideabi- \
               AR=llvm-ar NM=llvm-nm \
               OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
               STRIP=llvm-strip LD=ld.lld CC=clang \
            2>&1 | tee out/build.log

          if [ ! -f out/arch/arm64/boot/Image ]; then
            echo "Kernel compilation failed!"
            exit 1
          fi

      - name: Package kernel artifacts
        run: |
          OUT_DIR=kernel_output
          mkdir -p $OUT_DIR
          cp out/arch/arm64/boot/Image $OUT_DIR/
          cp out/arch/arm64/boot/dtb    $OUT_DIR/ 2>/dev/null || true
          cp out/arch/arm64/boot/dtbo.img $OUT_DIR/ 2>/dev/null || true

          ZIP_BASENAME="Meteoric-KernelSU-Next-SUSFS-${{ github.event.inputs.version }}-$(date +%y%m%d-%H%M).zip"
          if [ -d anykernel ]; then
            cp out/arch/arm64/boot/Image anykernel/
            cp out/arch/arm64/boot/dtb anykernel/ 2>/dev/null || true
            cp out/arch/arm64/boot/dtbo.img anykernel/ 2>/dev/null || true
            (cd anykernel && zip -r9 "../$OUT_DIR/$ZIP_BASENAME" .)
          else
            (cd $OUT_DIR && zip -r9 "$ZIP_BASENAME" Image dtb dtbo.img 2>/dev/null || zip -r9 "$ZIP_BASENAME" Image)
          fi
          echo "ZIPNAME=$ZIP_BASENAME" >> $GITHUB_ENV

      - name: Upload artifacts
        if: ${{ !github.event.inputs.make_draft }}
        uses: actions/upload-artifact@v4
        with:
          name: meteoric-kernelsu-next-susfs-${{ github.event.inputs.version }}
          path: |
            kernel_output/*.zip
            kernel_output/Image
            kernel_output/dtb
            kernel_output/dtbo.img
          retention-days: 30

      - name: Create GitHub Release (draft)
        if: ${{ github.event.inputs.make_draft }}
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Meteoric Kernel ${{ github.event.inputs.version }} - KernelSU-Next + SUSFS"
          body: |
            ## Meteoric Kernel ${{ github.event.inputs.version }}  
            **Features:**  
            - KernelSU-Next integration for advanced root management  
            - SUSFS for comprehensive root hiding  
            - Compatible with Nothing Phone 2 (SM8475)  

            **Installation:**  
            1. Flash via custom recovery (TWRP/OrangeFox)  
            2. Or extract `boot.img` and flash via `fastboot`  

            **KernelSU Manager:**  
            - Install KernelSU-Next Manager APK  
            - Access SUSFS features via `ksu_susfs` tool  

            **Changelog:**  
            - Updated to latest KernelSU-Next  
            - Integrated SUSFS patches  
            - Optimized build configuration  
          files: kernel_output/*.zip
          draft: true
          prerelease: false
