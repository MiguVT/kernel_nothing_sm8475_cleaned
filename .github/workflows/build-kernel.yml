name: Build Meteoric Kernel with KernelSU-Next + SUSFS

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the release'
        required: true
        default: 'Snapshot'
        type: string
      make_draft:
        description: 'Create release draft instead of artifact?'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          bc \
          git \
          curl \
          libncurses-dev \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          clang \
          lld \
          llvm \
          zstd \
          binutils-aarch64-linux-gnu

    - name: Setup KernelSU-Next
      run: |
        echo "Setting up KernelSU-Next..."
        curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/next-susfs/kernel/setup.sh" | bash -s next-susfs

    - name: Clone and apply SUSFS patches
      run: |
        echo "Cloning susfs4ksu repository (latest branch commit)..."
        git clone https://gitlab.com/simonpunk/susfs4ksu.git --branch gki-android12-5.10 --depth=1

        KERNEL_REPO="$GITHUB_WORKSPACE"

        # Copy patches to correct locations
        cp susfs4ksu/kernel_patches/50_add_susfs_in_*.patch $KERNEL_REPO/

        # Copy SUSFS source files
        cp -r susfs4ksu/kernel_patches/fs/* $KERNEL_REPO/fs/
        cp -r susfs4ksu/kernel_patches/include/linux/* $KERNEL_REPO/include/linux/

        echo "Applying 50_add_susfs_in_ patch in kernel root..."
        cd $KERNEL_REPO
        patch -p1 < 50_add_susfs_in_*.patch || exit 1

        echo "SUSFS patches applied successfully"

    - name: Setup Android NDK
      run: |
        echo "Setting up Android NDK for SUSFS userspace tools..."

        # Download and install Android NDK
        NDK_VERSION="25.2.9519653"
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip

        # Set up NDK paths
        export ANDROID_NDK_HOME="$GITHUB_WORKSPACE/android-ndk-r25c"
        export PATH="$ANDROID_NDK_HOME:$PATH"

        # Verify ndk-build is available
        ls -la $ANDROID_NDK_HOME/ndk-build

        # Add NDK to environment for subsequent steps
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        echo "$ANDROID_NDK_HOME" >> $GITHUB_PATH

    - name: Build SUSFS userspace tools
      run: |
        echo "Building ksu_susfs userspace tool..."
        cd susfs4ksu

        # Verify NDK is available
        echo "NDK location: $ANDROID_NDK_HOME"
        which ndk-build || echo "ndk-build not found in PATH"

        # Build the userspace tool
        chmod +x build_ksu_susfs_tool.sh
        ./build_ksu_susfs_tool.sh

        # Verify that the tool was built successfully
        if [ ! -f "ksu_module_susfs/tools/ksu_susfs_arm64" ]; then
          echo "❌ Failed to build ksu_susfs tool!"
          exit 1
        fi

        echo "✅ ksu_susfs tool built successfully"
        ls -la ksu_module_susfs/tools/
        cd ..

    - name: Setup toolchain
      run: |
        echo "Setting up Neutron toolchain..."
        mkdir -p ~/toolchain/neutron-clang
        cd ~/toolchain/neutron-clang
        curl -sL https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman -o antman
        chmod +x antman && ./antman -S
        echo "~/toolchain/neutron-clang/bin" >> $GITHUB_PATH

    - name: Configure and Optimize Kernel
      run: |
        chmod +x .github/scripts/configure_kernel.sh
        ./.github/scripts/configure_kernel.sh

    - name: Build kernel
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_BUILD_HOST=GitHub-Actions
        export KBUILD_BUILD_USER=ci-builder
        export PROCS=$(nproc)
        export LD=ld.lld

        echo "Starting kernel compilation..."

        make -j$PROCS O=out ARCH=arm64 \
             LLVM=1 LLVM_IAS=1 \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             CROSS_COMPILE=aarch64-linux-android- \
             CROSS_COMPILE_COMPAT=arm-linux-androideabi- \
             AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
             STRIP=llvm-strip LD=ld.lld \
             CC=clang \
             2>&1 | tee out/build.log

        if [ ! -f out/arch/arm64/boot/Image ]; then
          echo "Kernel compilation failed!"
          exit 1
        fi

        echo "Kernel compiled successfully"

    - name: Package kernel
      run: |
        echo "Packaging kernel..."

        # Create output directory
        mkdir -p kernel_output

        # Copy kernel components
        cp out/arch/arm64/boot/Image kernel_output/
        cp out/arch/arm64/boot/dtb kernel_output/ 2>/dev/null || true
        cp out/arch/arm64/boot/dtbo.img kernel_output/ 2>/dev/null || true

        # Include SUSFS userspace tools
        echo "Including SUSFS userspace tools..."
        mkdir -p kernel_output/susfs_tools
        cp susfs4ksu/ksu_module_susfs/tools/ksu_susfs_arm64 kernel_output/susfs_tools/ksu_susfs 2>/dev/null || true

        # Create AnyKernel3 package if available
        if [ -d "anykernel" ]; then
          cp out/arch/arm64/boot/Image anykernel/
          cp out/arch/arm64/boot/dtb anykernel/ 2>/dev/null || true
          cp out/arch/arm64/boot/dtbo.img anykernel/ 2>/dev/null || true
          
          # Add SUSFS userspace tool to AnyKernel3
          mkdir -p anykernel/susfs_tools
          cp susfs4ksu/ksu_module_susfs/tools/ksu_susfs_arm64 anykernel/susfs_tools/ksu_susfs 2>/dev/null || true
          
          # Modify anykernel.sh to install the tool automatically
          if [ -f "anykernel/anykernel.sh" ]; then
            echo "" >> anykernel/anykernel.sh
            echo "# Install SUSFS userspace tool" >> anykernel/anykernel.sh  
            echo 'ui_print "Installing SUSFS userspace tool..."' >> anykernel/anykernel.sh
            echo 'mkdir -p /data/adb/ksu/bin' >> anykernel/anykernel.sh
            echo 'cp $home/susfs_tools/ksu_susfs /data/adb/ksu/bin/ksu_susfs' >> anykernel/anykernel.sh
            echo 'chmod 755 /data/adb/ksu/bin/ksu_susfs' >> anykernel/anykernel.sh
            echo 'ui_print "SUSFS userspace tool installed successfully"' >> anykernel/anykernel.sh
          fi

          cd anykernel
          ZIPNAME="Meteoric-KernelSU-Next-SUSFS-${{ github.event.inputs.version }}-$(date +%y%m%d-%H%M).zip"
          zip -r9 "../kernel_output/$ZIPNAME" *
          cd ..
          echo "ZIPNAME=$ZIPNAME" >> $GITHUB_ENV
        else
          # Create basic zip with susfs tools
          cd kernel_output
          ZIPNAME="Meteoric-KernelSU-Next-SUSFS-${{ github.event.inputs.version }}-$(date +%y%m%d-%H%M).zip"
          zip -r9 "$ZIPNAME" Image dtb dtbo.img susfs_tools 2>/dev/null || zip -r9 "$ZIPNAME" Image susfs_tools
          echo "ZIPNAME=$ZIPNAME" >> $GITHUB_ENV
        fi

        # Cleanup after using the tools
        rm -rf susfs4ksu
        echo "Cleanup completed"

    - name: Upload artifacts
      if: ${{ !github.event.inputs.make_draft }}
      uses: actions/upload-artifact@v4
      with:
        name: meteoric-kernelsu-next-susfs-${{ github.event.inputs.version }}
        path: |
          kernel_output/*.zip
          kernel_output/Image
          kernel_output/dtb
          kernel_output/dtbo.img
          kernel_output/susfs_tools
        retention-days: 30

    - name: Create Release
      if: ${{ github.event.inputs.make_draft }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: "Meteoric Kernel ${{ github.event.inputs.version }} - KernelSU-Next + SUSFS"
        body: |
          ## Meteoric Kernel ${{ github.event.inputs.version }} - Made by HELLBOY017 | Mod by MiguVT

          **Features:**
          - KernelSU-Next integration for advanced root management
          - SUSFS (SuFS) for comprehensive root hiding at kernel level
          - Includes ksu_susfs userspace tool for full functionality
          - Compatible with Nothing Phone 2 (SM8475)

          **Installation:**
          1. Flash the provided ZIP file via custom recovery (TWRP/OrangeFox)
          2. Or extract boot.img and flash via fastboot: `fastboot flash boot boot.img` (Not tested, I (MiguVT) use OrangeFox) 

          **KernelSU Manager:**
          - Install KernelSU-Next Manager APK
          - SUSFS features available through ksu_susfs tool (automatically installed)
          - Applications will now receive root access correctly

          **What's Fixed:**
          - Included ksu_susfs userspace tool for proper app root functionality
          - Automatic installation of SUSFS tools during kernel flash
          - Full KernelSU-Next + SUSFS integration

          **Changelog:**
          - Updated to latest KernelSU-Next
          - Integrated SUSFS patches for enhanced root hiding
          - Added ksu_susfs userspace tool compilation and installation
          - Optimized build configuration

        files: |
          kernel_output/*.zip
        prerelease: false
        draft: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
