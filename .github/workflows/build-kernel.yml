name: Build Meteoric Kernel with KernelSU-Next + SUSFS

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the release'
        required: true
        default: 'Snapshot'
        type: string
      make_draft:
        description: 'Create release draft instead of artifact?'
        required: true
        default: false
        type: boolean

concurrency:
  group: meteoric-kernel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    env:
      OUT_DIR: out
      KERNEL_DEFCONFIG: vendor/meteoric_defconfig
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup build environment
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            bc \
            git \
            curl \
            libncurses-dev \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            clang \
            lld \
            llvm \
            zstd \
            ccache \
            binutils-aarch64-linux-gnu \
            zip \
            python3 \
            xz-utils \
            ca-certificates

      - name: Cache Neutron toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ~/toolchain/neutron-clang
          key: neutron-clang-${{ runner.os }}-${{ hashFiles('.github/workflows/build-kernel.yml') }}

      - name: Cache ccache
        id: cache-ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('.github/config-fragments/*.config') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-

      - name: Setup toolchain (if cache miss)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          echo "Setting up Neutron toolchain..."
          mkdir -p ~/toolchain/neutron-clang
          cd ~/toolchain/neutron-clang
          curl -sL https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman -o antman
          chmod +x antman
          ./antman -S
          rm -f antman
          echo "Toolchain files:"
          ls -1 | head -n 20

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: android-ndk-r25c
          key: ndk-r25c-${{ runner.os }}

      - name: Setup Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          echo "Downloading Android NDK r25c..."
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          sha256sum android-ndk-r25c-linux.zip > ndk_download.sha256
          echo "NDK archive SHA256:"; cat ndk_download.sha256
          unzip -q android-ndk-r25c-linux.zip
          rm android-ndk-r25c-linux.zip

      - name: Export tool paths
        run: |
          set -euo pipefail
          echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_PATH
          echo "~/toolchain/neutron-clang/bin" >> $GITHUB_PATH
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV

      - name: Setup KernelSU-Next
        run: |
          set -euo pipefail
          echo "Setting up KernelSU-Next..."
          KSUNEXT_BRANCH=next-susfs
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/${KSUNEXT_BRANCH}/kernel/setup.sh" -o setup.sh
          grep -q "KernelSU" setup.sh || { echo "Unexpected setup.sh content" >&2; exit 1; }
          bash setup.sh "$KSUNEXT_BRANCH"
          rm -f setup.sh
          # Robust verification of KernelSU integration:
          # 1. Look for Kconfig symbol 'config KSU'
          # 2. Or any CONFIG_KSU reference in headers / source
          # 3. Or presence of typical path kernel/kernelsu or KernelSU-Next directory
          if [ ! -d kernel/kernelsu ] && [ ! -d KernelSU-Next ] && ! grep -R "config KSU" -n . >/dev/null && ! grep -R "CONFIG_KSU" -n include 2>/dev/null; then
            echo "WARNING: Could not positively verify KernelSU integration (no kernel/kernelsu dir or KSU symbols). Listing kernel/ directory for debugging:" >&2
            ls -al kernel || true
            echo "Continuing build; if KSU features fail enable debug_build=1 and inspect .config" >&2
          else
            echo "KernelSU integration verified (symbols or directories present)."
          fi

      - name: Clone and apply SUSFS patches
        run: |
          set -euo pipefail
          echo "Cloning susfs4ksu repository (latest branch commit)..."
          git clone https://gitlab.com/simonpunk/susfs4ksu.git --branch gki-android12-5.10 --depth=1
          KERNEL_REPO="$GITHUB_WORKSPACE"
          cd "$KERNEL_REPO"
          cp susfs4ksu/kernel_patches/50_add_susfs_in_*.patch .
          PATCH_FILE=$(ls 50_add_susfs_in_*.patch | head -n1)
          echo "Applying $PATCH_FILE ..."
          patch -p1 < "$PATCH_FILE"
          echo "SUSFS patch applied successfully"
          cp -r susfs4ksu/kernel_patches/fs/* fs/
          cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/

      - name: Build SUSFS userspace tools
        run: |
          set -euo pipefail
          echo "Building ksu_susfs userspace tool..."
          cd susfs4ksu
          chmod +x build_ksu_susfs_tool.sh
          ./build_ksu_susfs_tool.sh
          test -f ksu_module_susfs/tools/ksu_susfs_arm64 || { echo "ksu_susfs tool build failed" >&2; exit 1; }
          ls -l ksu_module_susfs/tools/

      - name: Build kernel
        run: |
          set -euo pipefail
          export ARCH=arm64 SUBARCH=arm64 KBUILD_BUILD_HOST=GitHub-Actions KBUILD_BUILD_USER=ci-builder
          export PROCS=$(nproc) LD=ld.lld
          export CC="ccache clang"
          ccache -s || true
          echo "Starting kernel compilation..."
          # Ensure output directory exists before tee attempts to write the log
          mkdir -p out
          echo "Using defconfig: $KERNEL_DEFCONFIG"
          # 1) Generate .config from defconfig (always regenerate for reproducibility)
          make O=out ARCH=arm64 "$KERNEL_DEFCONFIG"
          test -f out/.config || { echo "Defconfig step failed: out/.config not generated" >&2; exit 1; }
          echo "Defconfig generated. Beginning full build..."
          # 2) Build the kernel proper, logging output
          make -j"$PROCS" O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_COMPAT=arm-linux-androideabi- \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip LD=ld.lld \
            CC="ccache clang" 2>&1 | tee out/build.log
          test -f out/arch/arm64/boot/Image || { echo "Kernel compilation failed" >&2; exit 1; }
          echo "Kernel compiled successfully"
          ccache -s || true

      - name: Verify KernelSU-Next + SUSFS integration
        run: |
          set -euo pipefail
          echo "Verifying kernel integration..."
          if [ -f out/arch/arm64/boot/Image ]; then
            echo "✓ Kernel Image built successfully"
            ls -lh out/arch/arm64/boot/Image
          fi
          # Check if KSU symbols are present in final config
          echo "KernelSU-Next + SUSFS symbols in final build:"
          grep -E 'CONFIG_KSU.*=y|CONFIG_.*SUSFS.*=y' out/.config || echo "WARNING: No KSU/SUSFS symbols found in final config"
          # Verify SUSFS userspace tool
          if [ -f susfs4ksu/ksu_module_susfs/tools/ksu_susfs_arm64 ]; then
            echo "✓ SUSFS userspace tool built successfully"
            ls -lh susfs4ksu/ksu_module_susfs/tools/ksu_susfs_arm64
          else
            echo "WARNING: SUSFS userspace tool not found"
          fi


      - name: Install modules
        run: |
          set -euo pipefail
          export ARCH=arm64 SUBARCH=arm64
          make -j1 O=out modules_install INSTALL_MOD_PATH=out/modules || true
          find out/modules -maxdepth 4 -type f -name "*.ko" -print || echo "No modules installed"

      - name: Package kernel
        run: |
          set -euo pipefail
          echo "Packaging kernel..."
          mkdir -p kernel_output
          cp out/arch/arm64/boot/Image kernel_output/
          cp out/arch/arm64/boot/dtb kernel_output/ 2>/dev/null || true
          cp out/arch/arm64/boot/dtbo.img kernel_output/ 2>/dev/null || true
          echo "Including SUSFS userspace tools..."
          mkdir -p kernel_output/susfs_tools
          cp susfs4ksu/ksu_module_susfs/tools/ksu_susfs_arm64 kernel_output/susfs_tools/ksu_susfs 2>/dev/null || true
          echo "Including built modules (if any)..."
          if [ -d out/modules/lib/modules ]; then
            cp -r out/modules/lib/modules kernel_output/
          fi
          if [ -d "anykernel" ]; then
            cp out/arch/arm64/boot/Image anykernel/
            cp out/arch/arm64/boot/dtb anykernel/ 2>/dev/null || true
            cp out/arch/arm64/boot/dtbo.img anykernel/ 2>/dev/null || true
            mkdir -p anykernel/susfs_tools
            cp susfs4ksu/ksu_module_susfs/tools/ksu_susfs_arm64 anykernel/susfs_tools/ksu_susfs 2>/dev/null || true
            if [ -f "anykernel/anykernel.sh" ]; then
              {
                echo ''
                echo '# Install SUSFS userspace tool'
                echo 'ui_print "Installing SUSFS userspace tool..."'
                echo 'mkdir -p /data/adb/ksu/bin'
                echo 'cp $home/susfs_tools/ksu_susfs /data/adb/ksu/bin/ksu_susfs'
                echo 'chmod 755 /data/adb/ksu/bin/ksu_susfs'
                echo 'ui_print "SUSFS userspace tool installed successfully"'
              } >> anykernel/anykernel.sh
            fi
            if [ -d out/modules/lib/modules ]; then
              mkdir -p anykernel/modules
              cp -r out/modules/lib/modules anykernel/modules/
            fi
            cd anykernel
            ZIPNAME="Meteoric-KernelSU-Next-SUSFS-${{ github.event.inputs.version }}-$(date +%y%m%d-%H%M).zip"
            zip -r9 "../kernel_output/$ZIPNAME" *
            cd ..
            echo "ZIPNAME=$ZIPNAME" >> $GITHUB_ENV
          else
            cd kernel_output
            ZIPNAME="Meteoric-KernelSU-Next-SUSFS-${{ github.event.inputs.version }}-$(date +%y%m%d-%H%M).zip"
            (zip -r9 "$ZIPNAME" Image dtb dtbo.img susfs_tools modules 2>/dev/null || zip -r9 "$ZIPNAME" Image susfs_tools modules 2>/dev/null || zip -r9 "$ZIPNAME" Image susfs_tools)
            echo "ZIPNAME=$ZIPNAME" >> $GITHUB_ENV
          fi
          # Clean source additions repo
          rm -rf susfs4ksu
          echo "Cleanup completed"

      - name: Upload artifacts (main)
        if: ${{ !github.event.inputs.make_draft }}
        uses: actions/upload-artifact@v4
        with:
          name: meteoric-kernelsu-next-susfs-${{ github.event.inputs.version }}
          path: |
            kernel_output/*.zip
            kernel_output/Image
            kernel_output/dtb
            kernel_output/dtbo.img
            kernel_output/susfs_tools
            kernel_output/modules
            out/.config
            out/ksu_savedefconfig
            out/base_original_defconfig
            out/ksu_focused_diff.txt
            out/ksu_susfs_symbols.txt
            out/fragment_hashes.txt
            out/ksu_susfs_merged.config
            out/build.log
          retention-days: 30

      - name: Upload artifacts (draft build logs) # ensure configs/logs retained for release draft
        if: ${{ github.event.inputs.make_draft }}
        uses: actions/upload-artifact@v4
        with:
          name: meteoric-kernel-draft-logs-${{ github.event.inputs.version }}
          path: |
            out/.config
            out/ksu_savedefconfig
            out/base_original_defconfig
            out/ksu_focused_diff.txt
            out/ksu_susfs_symbols.txt
            out/fragment_hashes.txt
            out/ksu_susfs_merged.config
            out/build.log
          retention-days: 10

      - name: Always upload logs (on failure too)
        if: always() && failure()
        uses: actions/upload-artifact@v4
        with:
          name: meteoric-kernel-failure-logs-${{ github.run_id }}
          path: |
            out/build.log
            out/.config
            out/ksu_focused_diff.txt
            out/ksu_susfs_symbols.txt
            out/fragment_hashes.txt
            out/ksu_susfs_merged.config
          retention-days: 7

      - name: Create Release
        if: ${{ github.event.inputs.make_draft }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: 'Meteoric Kernel ${{ github.event.inputs.version }} - KernelSU-Next + SUSFS'
          body: |
            ## Meteoric Kernel ${{ github.event.inputs.version }} - Made by HELLBOY017 | Mod by MiguVT

            **Features:**
            - KernelSU-Next + SUSFS integration

            **Installation:**
            1. Flash ZIP in custom recovery
            2. Or extract boot.img and flash: `fastboot flash boot boot.img`

            **Manager:** Install KernelSU-Next Manager APK and grant root.

            **Changelog:**
            - Build mode selection (BASE / DEBUG / PROD) controls SUSFS logging
            - Streamlined single fragment merge for KernelSU-Next + SuSFS
            - Added focused diff & symbol summary artifacts
            - Packaging name includes build mode & version
            - Caching & concurrency retained for faster CI

          files: |
            kernel_output/*.zip
          prerelease: false
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
