name: Build KernelSU-Next with SUSFS Integration

on:
  push:
    branches: [base, clean]
  pull_request:
    branches: [base, clean]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create release draft'
        required: false
        default: false
        type: boolean
      wildkernels_commit:
        description: 'WildKernels commit hash'
        required: false
        default: 'f2227a36f02adf3776fc9d432734faf04787f3fa'
        type: string
      susfs_commit:
        description: 'SUSFS commit hash'
        required: false
        default: 'b994a76465d39e38ac16a39e51aa07ef01ec6abc'
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      DEFAULT_WILDKERNELS_COMMIT: 'f2227a36f02adf3776fc9d432734faf04787f3fa'
      DEFAULT_SUSFS_COMMIT: 'b994a76465d39e38ac16a39e51aa07ef01ec6abc'
    strategy:
      matrix:
        variant: [stable, experimental]
        include:
          - variant: stable
            wildkernels_commit_override: 'f2227a36f02adf3776fc9d432734faf04787f3fa'
            susfs_commit_override: 'b994a76465d39e38ac16a39e51aa07ef01ec6abc'
          - variant: experimental
            wildkernels_commit_override: 'latest'
            susfs_commit_override: 'latest'

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: MiguVT/kernel_nothing_sm8475_github_actions
          ref: clean

      - name: Cache NDK and tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ndk
            ~/.cache/clang
            ~/.cache/llvm
          key: ${{ runner.os }}-ndk-r26d-clang-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-ndk-r26d-clang-
            ${{ runner.os }}-ndk-r26d-
            ${{ runner.os }}-ndk-

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev
          sudo apt-get install -y clang lld llvm git gawk lz4 cpio xz-utils pahole
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
          sudo apt-get install -y python3-pip python3-dev
          # Tools for packaging
          sudo apt-get install -y zip unzip

      - name: Clone repositories
        run: |
          # Use dynamic commit hashes with variant-specific logic
          if [ "${{ matrix.variant }}" = "experimental" ]; then
            # For experimental builds, use latest commits unless user specifies otherwise
            WILDKERNELS_COMMIT="latest"
            SUSFS_COMMIT="latest"
          else
            # For stable builds, use proven stable commits unless user specifies otherwise
            WILDKERNELS_COMMIT="${{ github.event.inputs.wildkernels_commit || env.DEFAULT_WILDKERNELS_COMMIT }}"
            SUSFS_COMMIT="${{ github.event.inputs.susfs_commit || env.DEFAULT_SUSFS_COMMIT }}"
          fi

          echo "Build Variant: ${{ matrix.variant }}"
          echo "Using WildKernels commit: $WILDKERNELS_COMMIT"
          echo "Using SUSFS commit: $SUSFS_COMMIT"

          # Clone WildKernels patches
          git clone https://github.com/WildKernels/kernel_patches.git
          cd kernel_patches
          if [ "$WILDKERNELS_COMMIT" = "latest" ]; then
            echo "Using latest WildKernels commit"
            git checkout main || git checkout master || git checkout next
            ACTUAL_WILDKERNELS_COMMIT=$(git rev-parse HEAD)
            echo "Actual WildKernels commit: $ACTUAL_WILDKERNELS_COMMIT"
          else
            git checkout "$WILDKERNELS_COMMIT"
          fi
          cd ..

          # Clone susfs4ksu
          git clone https://gitlab.com/simonpunk/susfs4ksu.git
          cd susfs4ksu
          if [ "$SUSFS_COMMIT" = "latest" ]; then
            echo "Using latest SUSFS commit"
            git checkout main || git checkout master
            ACTUAL_SUSFS_COMMIT=$(git rev-parse HEAD)
            echo "Actual SUSFS commit: $ACTUAL_SUSFS_COMMIT"
          else
            git checkout "$SUSFS_COMMIT"
          fi
          cd ..

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Install KernelSU-Next
        run: |
          set -euo pipefail

          echo "=== Installing KernelSU-Next ==="
          if [ "${{ matrix.variant }}" = "experimental" ]; then
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          else
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
          fi

      - name: Apply all patches (WildKernels + SUSFS integration)
        run: |
          set -euo pipefail

          echo "=== Applying patches in correct order ==="

          # 1. Apply WildKernels next_hooks patch (includes SUSFS KernelSU integration)
          echo "1. Applying WildKernels next_hooks.patch..."
          patch --forward -p1 < kernel_patches/next/next_hooks.patch

          # 2. Copy SUSFS kernel files (REQUIRED)
          echo "2. Copying SUSFS kernel files..."
          cp -r susfs4ksu/kernel_patches/fs/* fs/
          cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/

          # 3. Apply SUSFS kernel patch (Android 12 version)
          echo "3. Applying SUSFS kernel patch..."
          patch --forward -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch

          echo "✅ Core patches applied successfully!"
          echo "ℹ️  Note: SUSFS KernelSU integration is already included in WildKernels patches"

      - name: Save patch information for debugging
        if: always()
        run: |
          set -euo pipefail

          echo "=== Saving patch information for debugging ==="
          mkdir -p artifacts/patch_info

          # Save information about applied patches
          {
            echo "=== Patch Application Summary ==="
            echo "Build Variant: ${{ matrix.variant }}"
            echo "Build Date: $(date)"
            if [ "${{ matrix.variant }}" = "experimental" ]; then
              echo "WildKernels Commit: latest ($(cd kernel_patches && git rev-parse HEAD))"
              echo "SUSFS Commit: latest ($(cd susfs4ksu && git rev-parse HEAD))"
            else
              echo "WildKernels Commit: ${{ github.event.inputs.wildkernels_commit || env.DEFAULT_WILDKERNELS_COMMIT }}"
              echo "SUSFS Commit: ${{ github.event.inputs.susfs_commit || env.DEFAULT_SUSFS_COMMIT }}"
            fi
            echo ""
            echo "✅ WildKernels next_hooks.patch applied (includes SUSFS KernelSU integration)"
            echo "✅ SUSFS kernel patches applied (fs/, include/linux/, kernel patch)"
            echo "✅ SUSFS fix patches applied (v1.5.9)"
            echo ""
            echo "=== Repository Status ==="
            echo "KernelSU-Next branch info:"
            cd KernelSU-Next && git log --oneline -5 || echo "Git log unavailable"
          } > artifacts/patch_info/patch_summary.txt

          echo "✅ Patch information saved to artifacts/patch_info/"

      - name: Apply SUSFS fix patches
        run: |
          set -euo pipefail

          echo "=== Applying SUSFS fix patches (v1.5.9) ==="

          # Apply all WildKernels SUSFS fix patches to KernelSU-Next in correct order
          echo "Applying SUSFS fix patches..."

          patch -d KernelSU-Next -p0 --forward < kernel_patches/next/susfs_fix_patches/v1.5.9/fix_apk_sign.c.patch
          patch -d KernelSU-Next -p0 --forward < kernel_patches/next/susfs_fix_patches/v1.5.9/fix_core_hook.c.patch
          patch -d KernelSU-Next -p0 --forward < kernel_patches/next/susfs_fix_patches/v1.5.9/fix_kernel_compat.c.patch
          patch -d KernelSU-Next -p0 --forward < kernel_patches/next/susfs_fix_patches/v1.5.9/fix_ksud.c.patch
          patch -d KernelSU-Next -p0 --forward < kernel_patches/next/susfs_fix_patches/v1.5.9/fix_rules.c.patch
          patch -d KernelSU-Next -p0 --forward < kernel_patches/next/susfs_fix_patches/v1.5.9/fix_selinux.c.patch
          patch -d KernelSU-Next -p1 --forward < kernel_patches/next/susfs_fix_patches/v1.5.9/fix_sucompat.c.patch

          echo "✅ SUSFS fix patches applied successfully!"

      #      - name: Apply compilation fixes (CRITICAL)
      #        run: |
      #          echo "=== Applying known compilation fixes ==="
      #
      #          #
      #          # If there is no known issues or old issues will be fixed, it will be commented like documentation of old issues because maybe it appear again :) just to make sure
      #          #
      #
      #          # Fix for ksu_devpts_hook compilation error (Issue #426)
      #          if [ -f "KernelSU-Next/kernel/sucompat.c" ]; then
      #            # Check if fix is needed
      #            if ! grep -q "bool ksu_devpts_hook" KernelSU-Next/kernel/sucompat.c; then
      #              echo "Applying ksu_devpts_hook fix..."
      #              # Add the missing declaration
      #              sed -i '/^#ifdef CONFIG_KSU_SUSFS_SUS_SU/i bool ksu_devpts_hook = false;' KernelSU-Next/kernel/sucompat.c
      #            fi
      #          fi

      - name: Configure kernel for KernelSU-Next + SUSFS
        run: |
          set -euo pipefail

          export ARCH=arm64
          export SUBARCH=arm64

          echo "=== Configuring kernel with KernelSU-Next + SUSFS ==="

          # Use meteoric defconfig as specified
          make O=out ARCH=arm64 vendor/meteoric_defconfig

          # Configure KernelSU-Next
          scripts/config --file out/.config --enable CONFIG_KSU
          scripts/config --file out/.config --disable CONFIG_KSU_DEBUG
          scripts/config --file out/.config --disable CONFIG_KSU_ALLOWLIST_WORKAROUND
          scripts/config --file out/.config --enable CONFIG_KSU_LSM_SECURITY_HOOKS

          # Configure KernelSU-Next SUSFS features
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_PATH
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_OVERLAYFS
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_TRY_UMOUNT
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SPOOF_UNAME
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_ENABLE_LOG
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT

          make O=out ARCH=arm64 olddefconfig

          echo "=== Verifying configuration ==="
          grep CONFIG_KSU= out/.config

          # Save configuration info
          {
            echo "=== KernelSU-Next + SUSFS Configuration (${{ matrix.variant }}) ==="
            echo "Build Variant: ${{ matrix.variant }}"
            echo "KernelSU-Next: https://github.com/KernelSU-Next/KernelSU-Next"
            if [ "${{ matrix.variant }}" = "experimental" ]; then
              echo "WildKernels patches: latest commit ($(cd kernel_patches && git rev-parse HEAD))"
              echo "SUSFS: latest commit ($(cd susfs4ksu && git rev-parse HEAD))"
              echo "Build Type: EXPERIMENTAL - Latest commits for cutting-edge features"
            else
              echo "WildKernels patches: commit ${{ github.event.inputs.wildkernels_commit || 'f2227a36f02adf3776fc9d432734faf04787f3fa' }}"
              echo "SUSFS: commit ${{ github.event.inputs.susfs_commit || 'b994a76465d39e38ac16a39e51aa07ef01ec6abc' }}"
              echo "Build Type: STABLE - Proven stable commits"
            fi
            echo "LSM Security Hooks: ENABLED"
            echo "Magic Mount Support: ENABLED"
            echo "All SUSFS Features: ENABLED for maximum root hiding"
            echo "Priority: STABILITY + ROOT HIDING EFFECTIVENESS"
            echo ""
            echo "=== Patch Application Status ==="
            echo "WildKernels Patches: COMPLETE (includes SUSFS KernelSU integration)"
            echo "SUSFS Patches: COMPLETE (all patches applied successfully)"
            echo "Build Status: STABLE"
          } > build_config.txt

      - name: Remove GKI protected exports (compatibility)
        run: |
          # Remove for better module compatibility
          rm -f android/abi_gki_protected_exports_aarch64 || true
          rm -f android/abi_gki_protected_exports_x86_64 || true

      - name: Build kernel with Clang (Modern toolchain)
        run: |
          set -euo pipefail

          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export LLVM=1
          export LLVM_IAS=1

          echo "=== Starting kernel build with configuration ==="
          echo "Build Variant: ${{ matrix.variant }} ✅"
          echo "WildKernels patches applied: ✅"
          echo "SUSFS kernel patches applied: ✅"
          echo "KernelSU-Next installed: ✅"
          echo "SUSFS fix patches applied: ✅"
          echo "LSM Security Hooks configured: ✅"

          make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 -j$(nproc) 2>&1 | tee kernel_build.log

          # Check build success
          if [ "${PIPESTATUS[0]}" -eq 0 ]; then
            echo "✅ Kernel build completed successfully with KernelSU-Next + SUSFS!"
          else
            echo "❌ Kernel build failed!"
            echo ""
            echo "🔍 Debugging Information:"
            echo "- Check kernel_build.log for specific compilation errors"
            echo "- Build artifacts contain patch analysis for debugging"
            echo ""
            echo "💡 Common solutions:"
            echo "1. Try different commit combinations using workflow inputs"
            echo "2. Use 'stable' variant instead of 'experimental'"
            echo "3. Check for updated SUSFS or KernelSU-Next versions"
            exit 1
          fi

      - name: Package kernel with AnyKernel3
        run: |
          set -euo pipefail
          echo "=== AnyKernel3 Packaging ==="
          if [ ! -d "anykernel" ]; then
            echo "❌ AnyKernel3 directory not found!"
            exit 1
          fi
          ANYKERNEL3_DIR="anykernel"
          # Use the GitHub run number for versioning to match release tag (e.g., v42)
          VERSION="v${{ github.run_number }}"
          ZIPNAME="Meteoric-KernelSU-Next-SUSFS-${{ matrix.variant }}"
          CLEANUP=true
          echo "📋 Variables configured:"
          echo "  • ANYKERNEL3_DIR: $ANYKERNEL3_DIR"
          echo "  • VERSION: $VERSION"
          echo "  • ZIPNAME: $ZIPNAME"
          echo "🔧 Detecting kernel essentials..."
          IMAGE=""
          for img in "out/arch/arm64/boot/Image.gz-dtb" "out/arch/arm64/boot/Image-dtb" "out/arch/arm64/boot/Image.gz" "out/arch/arm64/boot/Image"; do
            if [ -f "$img" ]; then
              IMAGE="$img"
              echo "✅ Found IMAGE: $(basename "$IMAGE")"
              break
            fi
          done
          if [ -z "$IMAGE" ]; then
            echo "❌ No kernel image found!"
            exit 1
          fi
          DTBO=""; DTB=""
          [ -f "out/arch/arm64/boot/dtbo.img" ] && DTBO="out/arch/arm64/boot/dtbo.img" && echo "✅ Found DTBO: $(basename "$DTBO")"
          [ -f "out/arch/arm64/boot/dtb" ] && DTB="out/arch/arm64/boot/dtb" && echo "✅ Found DTB: $(basename "$DTB")"
          echo "***********************************************"
          echo "              Copying kernel essentials       "
          echo "***********************************************"
          cp -- "$IMAGE" "$ANYKERNEL3_DIR/"
            [ -n "$DTBO" ] && [ -f "$DTBO" ] && cp -- "$DTBO" "$ANYKERNEL3_DIR/" || echo "⚠️ No DTBO to copy"
            [ -n "$DTB" ] && [ -f "$DTB" ] && cp -- "$DTB" "$ANYKERNEL3_DIR/" || echo "⚠️ No DTB to copy"
          echo "***********************************************"
          echo "                Time to zip up!                "
          echo "***********************************************"
          if [ $CLEANUP = true ]; then
            echo "🧹 Cleaning up old zips..."
            rm -rf out/*.zip 2>/dev/null || true
          fi
          mkdir -p out
          cd "$ANYKERNEL3_DIR/"
          FINAL_ZIP=$ZIPNAME-$VERSION-$(date +%y%m%d-%H%M).zip
          echo "📦 Creating: $FINAL_ZIP"
          zip -r9 "../out/$FINAL_ZIP" * -x README "$FINAL_ZIP"
          cd ..
          echo "🧹 Cleaning AnyKernel3 directory..."
          rm -rf "$ANYKERNEL3_DIR"/Image "$ANYKERNEL3_DIR"/Image.* "$ANYKERNEL3_DIR"/dtbo.img "$ANYKERNEL3_DIR"/dtb
          if [ "$(find out/ -name "$FINAL_ZIP" | wc -l)" -ne 0 ]; then
            echo "***********************************************"
            echo "            Done, here is your sha1            "
            echo "***********************************************"
            SHA1=$(sha1sum "out/$FINAL_ZIP" | cut -d' ' -f1)
            echo "SHA1: $SHA1"
            FILESIZE=$(stat -f%z "out/$FINAL_ZIP" 2>/dev/null || stat -c%s "out/$FINAL_ZIP")
            echo "Size: $FILESIZE bytes"
            echo "File: $FINAL_ZIP"
            if unzip -tq "out/$FINAL_ZIP"; then
              echo "✅ Package integrity verified"
            else
              echo "❌ Package integrity check failed!"
              exit 1
            fi
          else
            echo "❌ Package creation failed!"
            exit 1
          fi
          mkdir -p artifacts
          cp "out/$FINAL_ZIP" artifacts/
          echo "ZIPNAME=$FINAL_ZIP" >> "$GITHUB_ENV"
          echo "PACKAGE_PATH=artifacts/$FINAL_ZIP" >> "$GITHUB_ENV"
          echo "PACKAGE_SHA1=$SHA1" >> "$GITHUB_ENV"
          {
            echo "=== Kernel Package Information ==="
            echo "Package: $FINAL_ZIP"
            echo "SHA1: $SHA1"
            echo "Size: $FILESIZE bytes"
            echo "Version: $VERSION"
            echo "Build Date: $(date +%y%m%d-%H%M)"
            echo "Kernel: Meteoric by HELLBOY017"
            echo "Root: KernelSU-Next + SUSFS (Module)"
            echo "Device: Nothing Phone 2 (A/B)"
            echo "Integrity: Verified ✅"
          } > artifacts/package_info.txt
          echo "✅ AnyKernel3 packaging completed successfully!"
          echo "📦 Package ready: artifacts/$FINAL_ZIP"
          echo "🔐 SHA1: $SHA1"

      - name: Prepare artifacts (ENHANCED)
        run: |
          set -euo pipefail

          mkdir -p artifacts

          # Copy kernel images with better detection
          found_image=false
          for img in "out/arch/arm64/boot/Image.gz-dtb" "out/arch/arm64/boot/Image-dtb" "out/arch/arm64/boot/Image.gz" "out/arch/arm64/boot/Image"; do
            if [ -f "$img" ]; then
              cp -- "$img" artifacts/
              echo "Kernel Image: $(basename \"$img\")" >> artifacts/build_info.txt
              found_image=true
              break
            fi
          done

          if [ "$found_image" = false ]; then
            echo "⚠️ No kernel image found! Listing available files..."
            find out/arch/arm64/boot/ -name "Image*" -type f || true
          fi

          # Copy DTB/DTBO if available
          [ -f "out/arch/arm64/boot/dtb" ] && cp -- "out/arch/arm64/boot/dtb" artifacts/ || true
          [ -f "out/arch/arm64/boot/dtbo.img" ] && cp -- "out/arch/arm64/boot/dtbo.img" artifacts/ || true

          # Copy configuration and logs
          cp out/.config artifacts/kernel_config || true
          cp kernel_build.log artifacts/ || true
          cp build_config.txt artifacts/ || true

          # Generate build info
          {
            echo "=== KernelSU-Next + SUSFS Build Information ==="
            echo "Build Date: $(date)"
            echo "Kernel Source: MiguVT/kernel_nothing_sm8475_github_actions (clean branch)"
            echo "KernelSU-Next: https://github.com/KernelSU-Next/KernelSU-Next"
            if [ "${{ matrix.variant }}" = "experimental" ]; then
              echo "WildKernels patches: latest commit (experimental)"
              echo "SUSFS: latest commit (experimental)"
              echo "Build Type: EXPERIMENTAL - Latest features and fixes"
            else
              echo "WildKernels patches: commit f2227a36f02adf3776fc9d432734faf04787f3fa"
              echo "SUSFS: commit b994a76465d39e38ac16a39e51aa07ef01ec6abc"
              echo "Build Type: STABLE - Proven stable commits"
            fi
            echo "Config: vendor/meteoric_defconfig"
            echo "Compiler: Clang with LLVM"
            echo "Architecture: ARM64"
            echo "Ubuntu Version: 24.04"
            echo ""
            echo "=== Build Process ==="
            echo "1. WildKernels next_hooks.patch applied"
            echo "2. SUSFS patches applied (fs/, include/, kernel patch)"
            echo "3. KernelSU-Next installed"
            echo "4. SUSFS fix patches applied to KernelSU-Next"
            echo "5. LSM Security Hooks configured"
            echo ""
            echo "=== Root Hiding Configuration ==="
            echo "LSM Security Hooks: ENABLED"
            echo "Magic Mount Support: ENABLED"
            echo "SUSFS Features: ALL enabled for maximum hiding"
            echo "SUSFS Module: Use module instead of userspace tools"
            echo "Priority: STABILITY + ROOT DETECTION BYPASS"
            echo ""
            echo "=== Available Files ==="
            find out/arch/arm64/boot/ -name "Image*" -o -name "dt*" 2>/dev/null || echo "Build artifacts listing unavailable"
          } >> artifacts/build_info.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-next-susfs-${{ matrix.variant }}-${{ github.sha }}
          path: artifacts/
          retention-days: 30

      - name: Create Release Draft
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ matrix.variant }}
          name: KernelSU-Next + SUSFS Build ${{ github.run_number }} (${{ matrix.variant }})
          draft: true
          prerelease: false
          files: artifacts/*
          body: |
            ## 🚀 KernelSU-Next + SUSFS Build

            ### 📋 Build Information
            - **Kernel Source**: MiguVT/kernel_nothing_sm8475_github_actions (clean branch)
            - **KernelSU-Next**: https://github.com/KernelSU-Next/KernelSU-Next
            - **Build Variant**: ${{ matrix.variant }}
            - **WildKernels patches**: ${{ matrix.variant == 'experimental' && 'latest commit (experimental)' || 'commit f2227a36f02adf3776fc9d432734faf04787f3fa (stable)' }}
            - **SUSFS**: ${{ matrix.variant == 'experimental' && 'latest commit (experimental)' || 'commit b994a76465d39e38ac16a39e51aa07ef01ec6abc (stable)' }}
            - **Configuration**: vendor/meteoric_defconfig
            - **Compiler**: Clang with LLVM (Modern Toolchain)
            - **Architecture**: ARM64
            - **Build Environment**: Ubuntu 24.04
            - **Build Date**: ${{ github.event.head_commit.timestamp }}

            ### ✅ Build Process
            This build follows this procedure:
            1. **✅ WildKernels next_hooks.patch applied**
            2. **✅ SUSFS patches applied** (fs/, include/linux/, kernel patch)
            3. **✅ KernelSU-Next installed**
            4. **✅ SUSFS fix patches applied** to KernelSU-Next
            5. **✅ LSM Security Hooks configured**

            ### ✨ Key Features & Optimizations
            - **✅ Proper SUSFS Integration** (patches applied in correct order)
            - **✅ LSM Security Hooks** (ENABLED for better compatibility)
            - **✅ Magic Mount Support** (ENABLED for KernelSU modules)
            - **✅ All SUSFS features enabled** for maximum root hiding
            - **✅ WildKernels patches** for improved stability
            - **✅ Prepared for SUSFS module**
            - **✅ Built following latest procedures** from community

            ### 🛡️ Maximum Root Hiding Capabilities
            - **Path Hiding**: Suspicious paths and app directories
            - **Mount Hiding**: All KernelSU and module mounts (auto-detection)
            - **Symbol Hiding**: KSU/SUSFS symbols from /proc/kallsyms
            - **Uname Spoofing**: Custom kernel version strings
            - **Cmdline/Bootconfig Spoofing**: Hide boot parameters
            - **Open Redirect**: Redirect file access attempts
            - **Magic Mount Support**: Full compatibility enabled
            - **Automatic Detection**: Auto-hide bind mounts and KSU mounts

            ### 🔧 Installation Instructions
            1. **⚠️ BACKUP**: Make sure to backup your current boot image!
            2. **Flash**: Use fastboot or custom recovery to flash the kernel (I only tested and recommend OrangeFox, the only recovery with full support for Nothing Phone 2/SM8475)
            3. **Manager**: Install KernelSU-Next manager from GitHub releases
            4. **Module**: Install [latest SUSFS module](https://github.com/sidex15/susfs4ksu-module/releases) through KernelSU manager (userspace tools not included)
